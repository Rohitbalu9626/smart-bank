# Server settings
server.port=${PORT:8080}
spring.application.name=smart-bank-system

# --- ACTIVE MYSQL PERSISTENT CONFIGURATION (AUTOMATIC FOR LOCAL AND RAILWAY) ---
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:smartbank}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:${DB_USERNAME:root}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Persistent Lifecycle Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Fix Spring Security credentials so they never change on restart
spring.security.user.name=${SECURITY_USER:user}
spring.security.user.password=${SECURITY_PASSWORD:BaluBank2026}
